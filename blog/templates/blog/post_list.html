{% extends 'blog/base.html' %}

{% block content %}
    {% for post in posts %}
        <div class="post">
            <div class="date">
                {{ post.published_date }}
            </div>
            <h1><a href="">{{ post.title }}</a></h1>
            <p>{{ post.text|linebreaksbr }}</p>
            
            {% if post.image %}
                <img src="{{ post.image.url }}" class="rounded intruder-image-list" alt="{{ post.title }}">
            {% endif %}
        </div>
    {% empty %}
        <p>아직 작성된 게시글이 없습니다.</p>
    {% endfor %}
{% endblock %}
